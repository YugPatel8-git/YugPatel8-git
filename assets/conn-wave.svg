<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 78" role="img" aria-labelledby="cwt cwd" preserveAspectRatio="xMidYMid meet">
<title id="cwt">Uplink waveform divider</title><desc id="cwd">Transmission waveform flowing between two endpoints.</desc>
<defs>
<linearGradient id="cwbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2a1640"/><stop offset="1" stop-color="#170b26"/></linearGradient>
<pattern id="cwgr" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#ff8c42" stroke-width="0.5" opacity="0.16"/></pattern>
<pattern id="cwsc" width="6" height="4" patternUnits="userSpaceOnUse"><rect width="6" height="1" fill="#00E5FF" opacity="0.05"/></pattern>
<filter id="cwgl" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<g fill="none" stroke="#ff8c42" stroke-width="1" opacity="0.22">
<path d="M0 14 H880"/><path d="M0 64 H880"/></g>
<path d="M20 39 H300" stroke="#00E5FF" stroke-width="1.5" fill="none"/>
<path d="M580 39 H860" stroke="#00E5FF" stroke-width="1.5" fill="none"/>
<path d="M300 39 q17 -26 35 0 t35 0 t35 0 t35 0 t35 0 t35 0 t35 0 t35 0" fill="none" stroke="#00E5FF" stroke-width="1.8" stroke-dasharray="240 320" filter="url(#cwgl)">
<animate attributeName="stroke-dashoffset" values="560;0" dur="9s" repeatCount="indefinite"/></path>
<g stroke="#ff3ea5" stroke-width="1.5" fill="none" opacity="0.9">
<path d="M440 20 v-8 m-6 4 l6 -6 6 6"/>
</g>
<text x="440" y="70" font-family="Consolas, Courier New, monospace" font-size="8" letter-spacing="3" fill="#ff8c42" text-anchor="middle">UPLINK CHANNEL OPEN</text>
<rect x="14" y="35" width="8" height="8" fill="#241236" stroke="#00E5FF" stroke-width="1.5"/>
<rect x="858" y="35" width="8" height="8" fill="#241236" stroke="#00E5FF" stroke-width="1.5"/>
</svg>