<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 78" role="img" aria-labelledby="cnt cnd" preserveAspectRatio="xMidYMid meet">
<title id="cnt">Neural mesh divider</title><desc id="cnd">Curved synaptic links with pulsing nodes and a traveling impulse.</desc>
<defs>
<linearGradient id="cnbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#131A36"/><stop offset="1" stop-color="#0B0E1A"/></linearGradient>
<pattern id="cngr" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#4D8AFF" stroke-width="0.5" opacity="0.16"/></pattern>
<pattern id="cnsc" width="6" height="4" patternUnits="userSpaceOnUse"><rect width="6" height="1" fill="#00E5FF" opacity="0.05"/></pattern>
<filter id="cngl" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<g fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.35">
<path d="M20 39 C160 8, 280 70, 440 39 S 720 8, 860 39"/>
<path d="M20 39 C160 70, 280 8, 440 39 S 720 70, 860 39"/>
</g>
<path id="cnm" d="M20 39 C160 8, 280 70, 440 39 S 720 8, 860 39" fill="none"/>
<g fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.85">
<path d="M230 24 L340 54 L440 39 L540 24 L650 54"/>
</g>
<g filter="url(#cngl)">
<circle cx="230" cy="24" r="4" fill="#7C3AED"><animate attributeName="r" values="3.4;5;3.4" dur="4s" repeatCount="indefinite"/></circle>
<circle cx="340" cy="54" r="4" fill="#4D8AFF"><animate attributeName="r" values="3.4;5;3.4" dur="4s" begin="0.8s" repeatCount="indefinite"/></circle>
<circle cx="440" cy="39" r="6" fill="#00E5FF"><animate attributeName="r" values="5;7;5" dur="4s" begin="1.6s" repeatCount="indefinite"/></circle>
<circle cx="540" cy="24" r="4" fill="#4D8AFF"><animate attributeName="r" values="3.4;5;3.4" dur="4s" begin="2.4s" repeatCount="indefinite"/></circle>
<circle cx="650" cy="54" r="4" fill="#7C3AED"><animate attributeName="r" values="3.4;5;3.4" dur="4s" begin="3.2s" repeatCount="indefinite"/></circle>
</g>
<text x="440" y="14" font-family="Consolas, Courier New, monospace" font-size="8" letter-spacing="3" fill="#7C3AED" text-anchor="middle">SYNAPTIC ROUTE</text>
<circle r="2.6" fill="#FF2D95"><animateMotion dur="10s" repeatCount="indefinite"><mpath href="#cnm"/></animateMotion></circle>
</svg>