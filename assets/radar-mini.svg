<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="animated radar sweep"><title>animated radar sweep</title>
  <defs>
    <linearGradient id="rs" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <circle cx="48" cy="48" r="44" fill="#241236" fill-opacity="0.6" stroke="#00E5FF" stroke-opacity="0.5" stroke-width="1.2"/>
  <circle cx="48" cy="48" r="30" fill="none" stroke="#00E5FF" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="48" cy="48" r="16" fill="none" stroke="#00E5FF" stroke-opacity="0.25" stroke-width="1"/>
  <line x1="4" y1="48" x2="92" y2="48" stroke="#00E5FF" stroke-opacity="0.18" stroke-width="1"/>
  <line x1="48" y1="4" x2="48" y2="92" stroke="#00E5FF" stroke-opacity="0.18" stroke-width="1"/>
  <g>
    <path d="M48 48 L92 48 A44 44 0 0 0 79 17 Z" fill="url(#rs)"/>
    <animateTransform attributeName="transform" type="rotate" from="0 48 48" to="360 48 48" dur="4.5s" repeatCount="indefinite"/>
  </g>
  <circle cx="66" cy="34" r="2.4" fill="#00E5FF">
    <animate attributeName="opacity" values="0;1;0" dur="4.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="34" cy="62" r="2" fill="#ff3ea5">
    <animate attributeName="opacity" values="0;1;0" dur="4.5s" begin="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
