<svg width="900" height="96" viewBox="0 0 900 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SYS.07 // TELEMETRY"><title>SYS.07 // TELEMETRY</title>
  <defs>
