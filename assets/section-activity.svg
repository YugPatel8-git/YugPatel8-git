    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"><animate attributeName="stop-color" values="#00E5FF;#4D8AFF;#00E5FF" dur="8s" repeatCount="indefinite"/></stop>
