<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 78" role="img" aria-labelledby="ctt ctd" preserveAspectRatio="xMidYMid meet">
<title id="ctt">Data transfer divider</title><desc id="ctd">Chevron data stream with an advancing transfer bar.</desc>
