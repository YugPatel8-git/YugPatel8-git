<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 78" role="img" aria-labelledby="cst csd" preserveAspectRatio="xMidYMid meet">
<title id="cst">Biometric scan divider</title><desc id="csd">Fingerprint scan node on a data line with a sweeping beam.</desc>
<defs>
<linearGradient id="csbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#131A36"/><stop offset="1" stop-color="#0B0E1A"/></linearGradient>
<pattern id="csgr" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#4D8AFF" stroke-width="0.5" opacity="0.16"/></pattern>
<pattern id="cssc" width="6" height="4" patternUnits="userSpaceOnUse"><rect width="6" height="1" fill="#00E5FF" opacity="0.05"/></pattern>
<filter id="csgl" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<g fill="none" stroke="#4D8AFF" stroke-width="1" opacity="0.22">
<path d="M0 18 H880"/><path d="M0 60 H880"/></g>
<path id="csb" d="M20 39 H360 M520 39 H860" stroke="#00E5FF" stroke-width="1.5" fill="none" opacity="0.9"/>
<g fill="none" stroke="#00E5FF" stroke-width="1.5" filter="url(#csgl)">
<circle cx="440" cy="39" r="24" opacity="0.9"/><circle cx="440" cy="39" r="17" opacity="0.5"/>
<path d="M431 32 a12 12 0 0 1 18 0 M428 39 a12 12 0 0 1 24 0" stroke="#FF2D95" opacity="0.9"/>
<path d="M433 45 a9 9 0 0 1 14 0" stroke="#FF2D95" opacity="0.7"/>
</g>
<g stroke="#7C3AED" stroke-width="1.5" fill="none" opacity="0.8"><path d="M404 15 h-12 v10 M476 63 h12 v-10"/></g>
<rect x="14" y="35" width="8" height="8" fill="#101530" stroke="#00E5FF" stroke-width="1.5"/>
<rect x="858" y="35" width="8" height="8" fill="#101530" stroke="#00E5FF" stroke-width="1.5"/>
<text x="440" y="74" font-family="Consolas, Courier New, monospace" font-size="8" letter-spacing="3" fill="#4D8AFF" text-anchor="middle" opacity="0.9">BIOMETRIC LINK VERIFIED</text>
<rect x="0" y="8" width="3" height="62" fill="#00E5FF" opacity="0.6"><animate attributeName="x" values="20;857;20" dur="14s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.5;0.08;0.5;0" dur="14s" repeatCount="indefinite"/></rect>
<circle r="3" fill="#00E5FF"><animateMotion dur="8s" repeatCount="indefinite"><mpath href="#csb"/></animateMotion></circle>
</svg>