<svg width="900" height="44" viewBox="0 0 900 44" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="circuit divider"><title>circuit divider</title>
  <defs>
    <linearGradient id="dl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/><stop offset="18%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#7C3AED"/><stop offset="82%" stop-color="#4D8AFF"/>
      <stop offset="100%" stop-color="#4D8AFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- circuit path: edges drop into a center chip -->
  <path d="M8 10 H330 L354 30 H406" stroke="url(#dl)" stroke-width="1.5" fill="none"/>
  <path d="M892 10 H570 L546 30 H494" stroke="url(#dl)" stroke-width="1.5" fill="none"/>
  <path d="M8 10 H330 L354 30 H406 M892 10 H570 L546 30 H494" stroke="#00E5FF" stroke-width="1.5" fill="none" opacity="0.35" stroke-dasharray="5 90">
    <animate attributeName="stroke-dashoffset" values="0;-190" dur="5s" repeatCount="indefinite"/>
  </path>
  <!-- nodes at bends -->
  <circle cx="330" cy="10" r="2.5" fill="#00E5FF" opacity="0.9"/>
  <circle cx="570" cy="10" r="2.5" fill="#4D8AFF" opacity="0.9"/>
  <!-- center chip -->
  <rect x="406" y="20" width="88" height="20" rx="4" fill="#0B0E1A" stroke="#7C3AED" stroke-width="1.2"/>
  <g stroke="#7C3AED" stroke-width="1.2" opacity="0.8">
    <line x1="418" y1="20" x2="418" y2="14"/><line x1="436" y1="20" x2="436" y2="14"/>
    <line x1="464" y1="20" x2="464" y2="14"/><line x1="482" y1="20" x2="482" y2="14"/>
  </g>
  <circle cx="428" cy="30" r="2.5" fill="#00E5FF"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
  <circle cx="450" cy="30" r="2.5" fill="#7C3AED"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
  <circle cx="472" cy="30" r="2.5" fill="#4D8AFF"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" begin="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
  <!-- data packets -->
  <circle r="3" fill="#00E5FF"><animateMotion dur="4s" repeatCount="indefinite" path="M8 10 H330 L354 30 H406"/></circle>
  <circle r="3" fill="#4D8AFF"><animateMotion dur="4s" begin="2s" repeatCount="indefinite" path="M892 10 H570 L546 30 H494"/></circle>
</svg>
