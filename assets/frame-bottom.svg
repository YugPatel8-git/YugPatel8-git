<svg viewBox="0 0 1400 56" xmlns="http://www.w3.org/2000/svg" role="img">
<title>frame bottom — neon dusk</title>
<defs>
  <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#ff8c42"/><stop offset="0.5" stop-color="#ff3ea5"/><stop offset="1" stop-color="#00e5ff"/>
  </linearGradient>
  <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#170b26" stop-opacity="0"/><stop offset="1" stop-color="#170b26"/>
  </linearGradient>
  <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="1400" height="56" fill="url(#fade)"/>
<!-- corner brackets -->
<path d="M14 22 V40 h34" fill="none" stroke="#ff8c42" stroke-width="2.4" filter="url(#g)"/>
<path d="M1386 22 V40 h-34" fill="none" stroke="#00e5ff" stroke-width="2.4" filter="url(#g)"/>
<!-- rail -->
<rect x="66" y="29.6" width="1268" height="2.4" rx="1.2" fill="url(#edge)" opacity="0.85"/>
<!-- ticks -->
<g stroke="#ff71ce" stroke-width="1.6" opacity="0.7">
  <line x1="240" y1="25" x2="240" y2="36"/><line x1="480" y1="25" x2="480" y2="36"/>
  <line x1="920" y1="25" x2="920" y2="36"/><line x1="1160" y1="25" x2="1160" y2="36"/>
</g>
<!-- label -->
<rect x="590" y="19" width="220" height="24" rx="12" fill="#170b26" stroke="#ff3ea5" stroke-width="1.2" filter="url(#g)"/>
<text x="700" y="35" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" letter-spacing="2.5" fill="#ffb36b">END OF TRANSMISSION<animate attributeName="opacity" values="1;1;0.5;1" dur="6s" repeatCount="indefinite"/></text>
<!-- packet (reverse) -->
<circle cy="30.8" r="3" fill="#fff1e6" filter="url(#g)">
  <animate attributeName="cx" values="1334;66" dur="7s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.94;1" dur="7s" repeatCount="indefinite"/>
</circle>
</svg>
