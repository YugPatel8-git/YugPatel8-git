<svg width="900" height="64" viewBox="0 0 900 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label=""><title>decorative cyberpunk HUD frame</title>
  <defs>
    <linearGradient id="fb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4D8AFF"><animate attributeName="stop-color" values="#4D8AFF;#7C3AED;#00E5FF;#4D8AFF" dur="8s" repeatCount="indefinite"/></stop>
      <stop offset="50%" stop-color="#7C3AED"><animate attributeName="stop-color" values="#7C3AED;#00E5FF;#4D8AFF;#7C3AED" dur="8s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#00E5FF"><animate attributeName="stop-color" values="#00E5FF;#4D8AFF;#7C3AED;#00E5FF" dur="8s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <linearGradient id="fade2" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B0E1A" stop-opacity="0"/><stop offset="100%" stop-color="#0B0E1A"/>
    </linearGradient>
  </defs>
  <rect width="900" height="64" fill="url(#fade2)"/>
  <line x1="450" y1="0" x2="450" y2="18" stroke="#00E5FF" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.8">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <path d="M0 50 H340 L368 26 H532 L560 50 H900" stroke="url(#fb)" stroke-width="2" fill="none"/>
  <path d="M0 50 H340 L368 26 H532 L560 50 H900" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.35" stroke-dasharray="26 880">
    <animate attributeName="stroke-dashoffset" values="0;906" dur="5s" repeatCount="indefinite"/>
  </path>
  <circle cx="340" cy="50" r="3" fill="#4D8AFF"/><circle cx="560" cy="50" r="3" fill="#00E5FF"/>
  <circle cx="450" cy="26" r="4" fill="#7C3AED"><animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
  <text x="450" y="44" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="10" letter-spacing="4" fill="#6C7BA8">EOF // SESSION.PERSISTENT</text>
</svg>
