<svg width="900" height="300" viewBox="0 0 900 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Yug Patel — AI-driven developer, builder, CS at ASU">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#05070F"/><stop offset="55%" stop-color="#0B0E1A"/><stop offset="100%" stop-color="#101530"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"><animate attributeName="stop-color" values="#00E5FF;#7C3AED;#4D8AFF;#00E5FF" dur="8s" repeatCount="indefinite"/></stop>
      <stop offset="50%" stop-color="#7C3AED"><animate attributeName="stop-color" values="#7C3AED;#4D8AFF;#00E5FF;#7C3AED" dur="8s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#4D8AFF"><animate attributeName="stop-color" values="#4D8AFF;#00E5FF;#7C3AED;#4D8AFF" dur="8s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="190" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/><stop offset="100%" stop-color="#00E5FF" stop-opacity="0.22"/>
    </linearGradient>
    <pattern id="gp" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" stroke="#16203D" stroke-width="1" fill="none" opacity="0.5"/>
    </pattern>
    <filter id="nz" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.4  0 0 0 0 0.7  0 0 0 0 1  0 0 0 0.05 0"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="6"/></filter>
    <clipPath id="clip"><path d="M28 2 H872 L898 28 V272 L872 298 H28 L2 272 V28 Z"/></clipPath>
  </defs>

  <path d="M28 2 H872 L898 28 V272 L872 298 H28 L2 272 V28 Z" fill="url(#bg)"/>
  <g clip-path="url(#clip)">
    <rect width="900" height="300" fill="url(#gp)"/>
    <rect width="900" height="300" filter="url(#nz)"/>

    <!-- perspective floor grid -->
    <g stroke="#00E5FF" opacity="0.28">
      <line x1="0" y1="212" x2="900" y2="212" stroke-width="0.8"/>
      <line x1="0" y1="228" x2="900" y2="228" stroke-width="1"/>
      <line x1="0" y1="250" x2="900" y2="250" stroke-width="1.2"/>
      <line x1="0" y1="278" x2="900" y2="278" stroke-width="1.4"/>
      <line x1="450" y1="200" x2="450" y2="300" stroke-width="0.8"/>
      <line x1="450" y1="200" x2="330" y2="300"/><line x1="450" y1="200" x2="210" y2="300"/>
      <line x1="450" y1="200" x2="60" y2="300"/><line x1="450" y1="200" x2="-140" y2="300"/>
      <line x1="450" y1="200" x2="570" y2="300"/><line x1="450" y1="200" x2="690" y2="300"/>
      <line x1="450" y1="200" x2="840" y2="300"/><line x1="450" y1="200" x2="1040" y2="300"/>
    </g>
    <rect x="0" y="190" width="900" height="110" fill="url(#floor)"/>

    <!-- holographic ring, right -->
    <g opacity="0.5">
      <circle cx="775" cy="120" r="62" stroke="#4D8AFF" stroke-width="1" opacity="0.5"/>
      <circle cx="775" cy="120" r="46" stroke="#00E5FF" stroke-width="1" stroke-dasharray="4 6" opacity="0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 775 120" to="360 775 120" dur="14s" repeatCount="indefinite"/>
      </circle>
      <circle cx="775" cy="120" r="30" stroke="#7C3AED" stroke-width="1.2" stroke-dasharray="30 160" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="360 775 120" to="0 775 120" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="775" cy="120" r="3" fill="#00E5FF"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
    </g>

    <!-- hex cluster, left -->
    <g stroke="#7C3AED" fill="none" opacity="0.45">
      <path d="M118 92 l16 -9 16 9 v19 l-16 9 -16 -9 Z"/>
      <path d="M150 111 l16 -9 16 9 v19 l-16 9 -16 -9 Z" stroke="#4D8AFF"/>
      <path d="M118 130 l16 -9 16 9 v19 l-16 9 -16 -9 Z" stroke="#00E5FF" opacity="0.6"/>
    </g>

    <!-- data-stream columns -->
    <g stroke-width="2" stroke-dasharray="3 9" opacity="0.5">
      <line x1="30" y1="0" x2="30" y2="300" stroke="#00E5FF"><animate attributeName="stroke-dashoffset" values="0;120" dur="5s" repeatCount="indefinite"/></line>
      <line x1="46" y1="0" x2="46" y2="300" stroke="#7C3AED" opacity="0.6"><animate attributeName="stroke-dashoffset" values="0;120" dur="7s" repeatCount="indefinite"/></line>
      <line x1="854" y1="0" x2="854" y2="300" stroke="#7C3AED" opacity="0.6"><animate attributeName="stroke-dashoffset" values="0;120" dur="6s" repeatCount="indefinite"/></line>
      <line x1="870" y1="0" x2="870" y2="300" stroke="#00E5FF"><animate attributeName="stroke-dashoffset" values="0;120" dur="4.5s" repeatCount="indefinite"/></line>
    </g>

    <!-- circuit traces -->
    <g stroke-width="1.5" fill="none">
      <path d="M0 58 H120 L150 88 H228" stroke="#00E5FF" opacity="0.6" stroke-dasharray="7 8"><animate attributeName="stroke-dashoffset" values="0;-60" dur="3s" repeatCount="indefinite"/></path>
      <path d="M900 246 H760 L730 216 H640" stroke="#4D8AFF" opacity="0.6" stroke-dasharray="7 8"><animate attributeName="stroke-dashoffset" values="0;60" dur="3.5s" repeatCount="indefinite"/></path>
    </g>
    <circle cx="228" cy="88" r="3.5" fill="#00E5FF"><animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="216" r="3.5" fill="#4D8AFF"><animate attributeName="opacity" values="0.25;1;0.25" dur="1.8s" repeatCount="indefinite"/></circle>

    <!-- glow orbs -->
    <circle cx="140" cy="220" r="60" fill="#7C3AED" opacity="0.10"><animate attributeName="cy" values="220;196;220" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="60" r="44" fill="#00E5FF" opacity="0.08"><animate attributeName="cx" values="700;730;700" dur="8s" repeatCount="indefinite"/></circle>

    <!-- sheen + scanlines -->
    <rect x="-140" y="0" width="80" height="300" fill="#00E5FF" opacity="0.07" transform="skewX(-20)"><animate attributeName="x" values="-140;1000" dur="7s" repeatCount="indefinite"/></rect>
    <rect x="0" y="0" width="900" height="2" fill="#00E5FF" opacity="0.22"><animate attributeName="y" values="0;298;0" dur="11s" repeatCount="indefinite"/></rect>
    <rect x="0" y="0" width="3" height="300" fill="#00E5FF" opacity="0.25"><animate attributeName="x" values="0;897;0" dur="13s" repeatCount="indefinite"/></rect>
  </g>

  <!-- frame -->
  <path d="M28 2 H872 L898 28 V272 L872 298 H28 L2 272 V28 Z" stroke="url(#acc)" stroke-opacity="0.8" stroke-width="2"/>
  <g stroke="#00E5FF" stroke-width="2.5">
    <path d="M2 40 V32 L32 2 H40"/><path d="M860 2 H868 L898 32 V40"/>
    <path d="M898 260 V268 L868 298 H860"/><path d="M40 298 H32 L2 268 V260"/>
  </g>
  <g stroke="#7C3AED" stroke-width="1.5" opacity="0.7">
    <path d="M10 52 V40 L40 10 H52"/><path d="M848 10 H860 L890 40 V52"/>
  </g>

  <!-- top status strip -->
  <line x1="60" y1="34" x2="840" y2="34" stroke="#16203D" stroke-width="1"/>
  <text x="66" y="27" font-family="Consolas, 'Courier New', monospace" font-size="11" letter-spacing="3" fill="#6C7BA8">SYS.ONLINE // PROFILE.LOADED</text>
  <circle cx="336" cy="23" r="3" fill="#00E5FF"><animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/></circle>
  <text x="834" y="27" text-anchor="end" font-family="Consolas, 'Courier New', monospace" font-size="11" letter-spacing="3" fill="#6C7BA8">v2026.07 // LINK:STABLE</text>

  <!-- name : blurred glow copy underneath, crisp text on top -->
  <text x="450" y="152" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="8" fill="url(#acc)" filter="url(#soft)" opacity="0.85">YUG PATEL</text>
  <text x="450" y="152" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="8" fill="#F4F7FF">YUG PATEL</text>

  <rect x="285" y="170" width="330" height="4" rx="2" fill="url(#acc)"><animate attributeName="opacity" values="1;0.45;1" dur="3s" repeatCount="indefinite"/></rect>

  <text x="450" y="204" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="16" letter-spacing="4" fill="url(#acc)">AI-DRIVEN DEVELOPER · BUILDER · CS @ ASU</text>

  <!-- status dots -->
  <g>
    <circle cx="366" cy="236" r="4" fill="#00E5FF"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="236" r="4" fill="#7C3AED"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="534" cy="236" r="4" fill="#4D8AFF"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" begin="0.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- mini radar, bottom-right -->
  <g opacity="0.9">
    <circle cx="836" cy="248" r="26" stroke="#00E5FF" stroke-width="1" fill="#0B0E1A" fill-opacity="0.6"/>
    <circle cx="836" cy="248" r="17" stroke="#00E5FF" stroke-width="0.7" fill="none" opacity="0.5"/>
    <circle cx="836" cy="248" r="8" stroke="#00E5FF" stroke-width="0.7" fill="none" opacity="0.5"/>
    <line x1="836" y1="222" x2="836" y2="274" stroke="#00E5FF" stroke-width="0.5" opacity="0.4"/>
    <line x1="810" y1="248" x2="862" y2="248" stroke="#00E5FF" stroke-width="0.5" opacity="0.4"/>
    <path d="M836 248 L836 222 A26 26 0 0 1 854 227 Z" fill="#00E5FF" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0 836 248" to="360 836 248" dur="4s" repeatCount="indefinite"/>
    </path>
    <circle cx="846" cy="238" r="2" fill="#FF2E88"><animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- bottom ticks -->
  <text x="66" y="272" font-family="Consolas, 'Courier New', monospace" font-size="10" letter-spacing="2" fill="#6C7BA8">DESIGN.WITH.AI // BUILD.WITH.INTENT // SHIP</text>
</svg>
