<svg width="900" height="260" viewBox="0 0 900 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B0E1A"/>
      <stop offset="100%" stop-color="#101530"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF">
        <animate attributeName="stop-color" values="#00E5FF;#7C3AED;#4D8AFF;#00E5FF" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#4D8AFF;#00E5FF;#7C3AED" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#4D8AFF">
        <animate attributeName="stop-color" values="#4D8AFF;#00E5FF;#7C3AED;#4D8AFF" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="900" height="260" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="258" rx="13" stroke="url(#accent)" stroke-opacity="0.55" stroke-width="2"/>

  <!-- grid texture -->
  <g stroke="#233052" stroke-width="1" opacity="0.35">
    <line x1="0" y1="65"  x2="900" y2="65"/>
    <line x1="0" y1="130" x2="900" y2="130"/>
    <line x1="0" y1="195" x2="900" y2="195"/>
    <line x1="150" y1="0" x2="150" y2="260"/>
    <line x1="300" y1="0" x2="300" y2="260"/>
    <line x1="450" y1="0" x2="450" y2="260"/>
    <line x1="600" y1="0" x2="600" y2="260"/>
    <line x1="750" y1="0" x2="750" y2="260"/>
  </g>

  <!-- drifting orbs -->
  <circle cx="120" cy="70" r="46" fill="#00E5FF" opacity="0.10">
    <animate attributeName="cy" values="70;95;70" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="780" cy="180" r="60" fill="#7C3AED" opacity="0.12">
    <animate attributeName="cy" values="180;150;180" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="55" r="30" fill="#4D8AFF" opacity="0.12">
    <animate attributeName="cx" values="640;670;640" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- telemetry corner brackets -->
  <g stroke="#00E5FF" stroke-width="2" opacity="0.9">
    <path d="M22 40 V22 H40"/>
    <path d="M860 22 H878 V40"/>
    <path d="M22 220 V238 H40"/>
    <path d="M860 238 H878 V220"/>
  </g>

  <!-- micro labels -->
  <text x="52" y="34" font-family="Consolas, 'Courier New', monospace" font-size="11" letter-spacing="3" fill="#5E6B93">SYS.ONLINE // PROFILE.LOADED</text>
  <text x="848" y="34" text-anchor="end" font-family="Consolas, 'Courier New', monospace" font-size="11" letter-spacing="3" fill="#5E6B93">v2026.07</text>

  <!-- name -->
  <text x="450" y="128" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="6" fill="#F4F7FF" filter="url(#glow)">YUG PATEL</text>

  <!-- animated underline -->
  <rect x="290" y="146" width="320" height="4" rx="2" fill="url(#accent)">
    <animate attributeName="opacity" values="1;0.45;1" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- subtitle -->
  <text x="450" y="182" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="16" letter-spacing="4" fill="url(#accent)">AI-DRIVEN DEVELOPER · BUILDER · CS @ ASU</text>

  <!-- pulse dots -->
  <g>
    <circle cx="330" cy="215" r="4" fill="#00E5FF"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="215" r="4" fill="#7C3AED"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="570" cy="215" r="4" fill="#4D8AFF"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" begin="0.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- scanline sweep -->
  <rect x="0" y="0" width="3" height="260" fill="#00E5FF" opacity="0.25">
    <animate attributeName="x" values="0;897;0" dur="12s" repeatCount="indefinite"/>
  </rect>
</svg>
