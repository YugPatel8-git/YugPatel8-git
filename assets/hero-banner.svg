<svg viewBox="0 0 1400 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Yug Patel — AI-driven developer · neon dusk metropolis</title>
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#1a0f2e"/>
    <stop offset="0.32" stop-color="#4a2560"/>
    <stop offset="0.55" stop-color="#93386b"/>
    <stop offset="0.72" stop-color="#d9556a"/>
    <stop offset="0.86" stop-color="#f97b4f"/>
    <stop offset="1" stop-color="#ffb36b"/>
  </linearGradient>
  <radialGradient id="sun" cx="0.5" cy="1" r="1">
    <stop offset="0" stop-color="#ffd9a0" stop-opacity="0.9"/>
    <stop offset="0.4" stop-color="#ff9d5c" stop-opacity="0.45"/>
    <stop offset="1" stop-color="#ff9d5c" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#00e5ff"/><stop offset="0.5" stop-color="#ff3ea5"/><stop offset="1" stop-color="#ff8c42"/>
  </linearGradient>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="winA" width="14" height="18" patternUnits="userSpaceOnUse">
    <rect width="14" height="18" fill="none"/><rect x="3" y="4" width="4" height="6" fill="#ffb36b" opacity="0.5"/><rect x="9" y="10" width="3" height="4" fill="#00e5ff" opacity="0.35"/>
  </pattern>
  <pattern id="winB" width="16" height="20" patternUnits="userSpaceOnUse">
    <rect width="16" height="20" fill="none"/><rect x="4" y="5" width="4" height="5" fill="#ff71ce" opacity="0.4"/><rect x="11" y="12" width="3" height="5" fill="#ffd9a0" opacity="0.45"/>
  </pattern>
</defs>

<!-- SKY -->
<rect width="1400" height="420" fill="url(#sky)"/>
<ellipse cx="740" cy="405" rx="620" ry="240" fill="url(#sun)"/>

<!-- STARS -->
<g fill="#fff1e6">
  <circle cx="120" cy="42" r="1.3"><animate attributeName="opacity" values="1;0.2;1" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="310" cy="70" r="1"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="530" cy="36" r="1.2"><animate attributeName="opacity" values="1;0.25;1" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="905" cy="55" r="1"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.6s" repeatCount="indefinite"/></circle>
  <circle cx="1130" cy="30" r="1.4"><animate attributeName="opacity" values="1;0.2;1" dur="4.8s" repeatCount="indefinite"/></circle>
  <circle cx="1330" cy="66" r="1"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.3s" repeatCount="indefinite"/></circle>
</g>

<!-- CLOUD BANDS -->
<g fill="#2a1035" opacity="0.55">
  <path d="M-80 96 q120 -30 300 -12 q200 20 380 0 q160 -18 320 4 q140 18 300 2 q90 -8 220 6 l0 30 q-180 16 -400 2 q-220 -14 -420 2 q-200 16 -420 0 q-160 -12 -280 -6 Z">
    <animateTransform attributeName="transform" type="translate" values="0 0;46 0;0 0" dur="60s" repeatCount="indefinite"/>
  </path>
  <path d="M-60 170 q180 -22 360 -6 q220 18 430 -2 q190 -16 350 6 q150 20 340 4 l0 26 q-210 14 -430 0 q-230 -14 -450 2 q-210 14 -400 -2 q-120 -10 -200 -4 Z" opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="0 0;-38 0;0 0" dur="75s" repeatCount="indefinite"/>
  </path>
</g>

<!-- BACK SKYLINE -->
<g fill="#3a2050" opacity="0.6">
  <path d="M0 420 V300 h48 v-40 h30 v40 h40 V260 h56 v160 Z M200 420 V276 h44 v-30 h26 v30 h38 v144 Z M340 420 V310 h60 v-52 h34 v52 h30 v110 Z M900 420 V292 h50 v-36 h28 v36 h44 v128 Z M1060 420 V262 h40 v-28 h24 v28 h48 v158 Z M1210 420 V296 h56 v-44 h30 v44 h44 v124 Z"/>
</g>

<!-- SHIPS -->
<g>
  <g opacity="0.9">
    <path d="M0 0 l34 4 l-4 7 l-28 2 q-10 -2 -8 -7 Z" fill="#170b26"/>
    <circle cx="30" cy="4" r="1.6" fill="#00e5ff"><animate attributeName="opacity" values="1;0.2;1" dur="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="2" cy="2" r="1.3" fill="#ff3ea5"/>
    <animateMotion path="M -60 96 q 400 -26 760 -8 q 380 18 760 -14" dur="52s" repeatCount="indefinite"/>
  </g>
  <g opacity="0.85">
    <path d="M0 0 l-30 3 l4 6 l24 2 q9 -2 7 -6 Z" fill="#1d0f2e"/>
    <circle cx="-26" cy="3" r="1.4" fill="#ffb020"><animate attributeName="opacity" values="0.3;1;0.3" dur="0.9s" repeatCount="indefinite"/></circle>
    <animateMotion path="M 1460 150 q -420 22 -780 6 q -360 -16 -740 12" dur="68s" repeatCount="indefinite"/>
  </g>
  <g opacity="0.95">
    <path d="M0 0 q14 -8 42 -6 q20 2 24 8 q-4 8 -30 9 q-28 1 -38 -5 q-2 -4 2 -6 Z" fill="#12081f"/>
    <rect x="8" y="-1" width="26" height="2" fill="#ff71ce" opacity="0.7"/>
    <circle cx="62" cy="2" r="2" fill="#00e5ff"><animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/></circle>
    <animateMotion path="M 1480 70 q -500 30 -1560 16" dur="90s" repeatCount="indefinite"/>
  </g>
</g>

<!-- MID SKYLINE -->
<g>
  <g fill="#241236">
    <path d="M40 420 V250 h70 v-26 h20 v26 h30 v170 Z"/>
    <path d="M235 420 V200 h84 v220 Z"/>
    <path d="M420 420 V282 h64 v-36 h22 v36 h30 v138 Z"/>
    <path d="M960 420 V226 h78 v194 Z"/>
    <path d="M1120 420 V258 h60 v-32 h20 v32 h38 v162 Z"/>
    <path d="M1290 420 V236 h72 v184 Z"/>
  </g>
  <rect x="243" y="210" width="68" height="200" fill="url(#winA)"/>
  <rect x="966" y="236" width="66" height="176" fill="url(#winB)"/>
  <rect x="1296" y="246" width="60" height="166" fill="url(#winA)"/>
  <!-- antenna beacons -->
  <line x1="277" y1="200" x2="277" y2="178" stroke="#170b26" stroke-width="2"/>
  <circle cx="277" cy="176" r="2.4" fill="#ff2d95"><animate attributeName="opacity" values="1;0.15;1" dur="1.6s" repeatCount="indefinite"/></circle>
  <circle cx="999" cy="222" r="2.2" fill="#ff2d95"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></circle>
  <!-- vertical neon sign · cyan -->
  <g filter="url(#glow)">
    <rect x="252" y="240" width="26" height="118" rx="3" fill="#12081f" stroke="#00e5ff" stroke-width="1.4"/>
    <text x="265" y="266" font-family="'Segoe UI',system-ui,sans-serif" font-size="20" fill="#00e5ff" text-anchor="middle">夜<tspan x="265" dy="27">行</tspan><tspan x="265" dy="27">開</tspan><tspan x="265" dy="27">発</tspan></text>
    <animate attributeName="opacity" values="1;1;0.55;1;1;0.8;1" keyTimes="0;0.4;0.45;0.5;0.8;0.85;1" dur="7s" repeatCount="indefinite"/>
  </g>
  <!-- vertical neon sign · pink -->
  <g filter="url(#glow)">
    <rect x="1305" y="262" width="24" height="92" rx="3" fill="#12081f" stroke="#ff3ea5" stroke-width="1.4"/>
    <text x="1317" y="286" font-family="'Segoe UI',system-ui,sans-serif" font-size="17" fill="#ff71ce" text-anchor="middle">張<tspan x="1317" dy="22">力</tspan><tspan x="1317" dy="22">夜</tspan><tspan x="1317" dy="22">夜</tspan></text>
  </g>
  <!-- billboards -->
  <g filter="url(#glow)">
    <rect x="432" y="296" width="88" height="30" rx="3" fill="#12081f" stroke="#ff8c42" stroke-width="1.2"/>
    <text x="476" y="308" font-family="'Segoe UI',system-ui,sans-serif" font-size="8.5" fill="#ffb36b" text-anchor="middle" letter-spacing="1">MARS COLONY</text>
    <text x="476" y="320" font-family="'Segoe UI',system-ui,sans-serif" font-size="7" fill="#00e5ff" text-anchor="middle" letter-spacing="0.5">YOUR FUTURE AWAITS</text>
  </g>
  <g filter="url(#glow)">
    <rect x="1128" y="276" width="76" height="26" rx="3" fill="#12081f" stroke="#00e5ff" stroke-width="1.2"/>
    <text x="1166" y="287" font-family="'Segoe UI',system-ui,sans-serif" font-size="8" fill="#00e5ff" text-anchor="middle" letter-spacing="1">NEON RAMEN</text>
    <text x="1166" y="297" font-family="'Segoe UI',system-ui,sans-serif" font-size="6.5" fill="#ff71ce" text-anchor="middle">OPEN ALL NIGHT</text>
    <animate attributeName="opacity" values="1;0.6;1;1" dur="4.4s" repeatCount="indefinite"/>
  </g>
</g>

<!-- NAME NEON SIGN -->
<g text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif">
  <g filter="url(#glow2)">
    <text x="700" y="176" font-size="64" font-weight="800" letter-spacing="6" fill="#fff1e6" stroke="#ff3ea5" stroke-width="1.6">YUG PATEL<animate attributeName="opacity" values="1;1;0.82;1;1;0.65;0.95;1" keyTimes="0;0.52;0.55;0.6;0.86;0.88;0.9;1" dur="8s" repeatCount="indefinite"/></text>
  </g>
  <g filter="url(#glow)">
    <text x="700" y="212" font-size="16.5" letter-spacing="5" fill="#00e5ff">AI-DRIVEN DEVELOPER · BUILDER · CS @ ASU</text>
  </g>
  <text x="700" y="238" font-size="11" letter-spacing="3" fill="#ffd9a0" opacity="0.85">DESIGN WITH AI · BUILD WITH INTENT · SHIP</text>
</g>

<!-- FRONT SKYLINE -->
<g fill="#12081f">
  <path d="M-10 420 V330 h60 v-24 h18 v24 h50 v90 Z"/>
  <path d="M150 420 V352 h90 v68 Z"/>
  <path d="M560 420 V356 h70 v-20 h16 v20 h40 v64 Z"/>
  <path d="M760 420 V348 h96 v72 Z"/>
  <path d="M1010 420 V344 h64 v-18 h14 v18 h36 v76 Z"/>
  <path d="M1230 420 V360 h100 v60 Z"/>
</g>
<g>
  <rect x="158" y="360" width="74" height="52" fill="url(#winB)"/>
  <rect x="768" y="356" width="80" height="56" fill="url(#winA)"/>
  <rect x="1016" y="352" width="52" height="60" fill="url(#winB)"/>
  <rect x="24" y="338" width="8" height="5" fill="#00e5ff" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.4s" repeatCount="indefinite"/></rect>
  <rect x="592" y="366" width="7" height="5" fill="#ff71ce" opacity="0.7"><animate attributeName="opacity" values="0.7;0.15;0.7" dur="2.8s" repeatCount="indefinite"/></rect>
</g>

<!-- ROOFTOP FOREGROUND -->
<path d="M0 420 V398 h430 l14 -8 h512 l14 8 h430 v22 Z" fill="#0c0616"/>
<!-- figure -->
<g fill="#0c0616">
  <path d="M348 398 v-26 q0 -4 3 -5 q-4 -3 -2 -7 q2 -4 6 -3 q4 1 4 5 q0 4 -3 5 q4 2 4 6 l0 8 l6 4 l-2 3 l-7 -3 l0 13 Z"/>
  <path d="M1042 398 v-8 q-3 -1 -3 -4 q0 -3 3 -4 q0 -3 3 -3 q3 0 3 3 q3 1 3 4 q0 3 -3 4 l0 8 Z"/>
  <path d="M1044 391 q4 -2 7 0 l3 -4 q1 -2 2 0 l-1 5 l-2 6 h-9 Z"/>
</g>
<!-- cat -->
<path d="M1090 398 q0 -7 5 -8 q-1 -3 1 -3 l2 2 q2 -1 3 0 l2 -2 q2 0 1 3 q4 2 4 8 Z M1108 396 q4 -6 2 -10 q3 3 2 10 Z" fill="#0c0616"/>

<!-- BOTTOM EDGE -->
<rect y="416" width="1400" height="4" fill="url(#edge)" opacity="0.9"/>
<circle cy="418" r="2.6" fill="#fff1e6" filter="url(#glow)">
  <animate attributeName="cx" values="-10;1410" dur="9s" repeatCount="indefinite"/>
</circle>
</svg>
