<svg viewBox="0 0 1400 56" xmlns="http://www.w3.org/2000/svg" role="img">
<title>frame top — neon dusk</title>
<defs>
  <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#00e5ff"/><stop offset="0.5" stop-color="#ff3ea5"/><stop offset="1" stop-color="#ff8c42"/>
  </linearGradient>
  <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#170b26"/><stop offset="1" stop-color="#170b26" stop-opacity="0"/>
  </linearGradient>
  <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="1400" height="56" fill="url(#fade)"/>
<!-- corner brackets -->
<path d="M14 34 V16 h34" fill="none" stroke="#00e5ff" stroke-width="2.4" filter="url(#g)"/>
<path d="M1386 34 V16 h-34" fill="none" stroke="#ff8c42" stroke-width="2.4" filter="url(#g)"/>
<!-- rail -->
<rect x="66" y="24" width="1268" height="2.4" rx="1.2" fill="url(#edge)" opacity="0.85"/>
<!-- ticks -->
<g stroke="#ff71ce" stroke-width="1.6" opacity="0.7">
  <line x1="240" y1="20" x2="240" y2="31"/><line x1="480" y1="20" x2="480" y2="31"/>
  <line x1="920" y1="20" x2="920" y2="31"/><line x1="1160" y1="20" x2="1160" y2="31"/>
</g>
<!-- label -->
<rect x="608" y="12" width="184" height="24" rx="12" fill="#170b26" stroke="#ff3ea5" stroke-width="1.2" filter="url(#g)"/>
<text x="700" y="28" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" letter-spacing="2.5" fill="#00e5ff">NEON DUSK // ONLINE<animate attributeName="opacity" values="1;0.55;1;1" dur="5s" repeatCount="indefinite"/></text>
<!-- packet -->
<circle cy="25.2" r="3" fill="#fff1e6" filter="url(#g)">
  <animate attributeName="cx" values="66;1334" dur="7s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.94;1" dur="7s" repeatCount="indefinite"/>
</circle>
</svg>
