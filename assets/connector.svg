<svg width="900" height="72" viewBox="0 0 900 72" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label=""><title>decorative circuit connector</title>
  <defs>
    <linearGradient id="cx" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="cg" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.2"/></filter>
  </defs>
  <!-- vertical spine (plugs into panel above and below) -->
  <line x1="450" y1="0" x2="450" y2="72" stroke="#00E5FF" stroke-opacity="0.5" stroke-width="1.5"/>
  <line x1="450" y1="0" x2="450" y2="72" stroke="#00E5FF" stroke-opacity="0.25" stroke-width="4" filter="url(#cg)"/>
  <!-- branch traces with elbows -->
  <path d="M450 36 H330 V24 H180" stroke="#4D8AFF" stroke-opacity="0.45" stroke-width="1.2"/>
  <path d="M450 36 H570 V48 H720" stroke="#7C3AED" stroke-opacity="0.45" stroke-width="1.2"/>
  <path d="M180 24 H96" stroke="url(#cx)" stroke-width="1.2"/>
  <path d="M720 48 H804" stroke="url(#cx)" stroke-width="1.2"/>
  <!-- nodes -->
  <circle cx="450" cy="36" r="4.5" fill="#0B0E1A" stroke="#00E5FF" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="1;0.45;1" dur="3.2s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="24" r="2.5" fill="#4D8AFF" fill-opacity="0.8"/>
  <circle cx="720" cy="48" r="2.5" fill="#7C3AED" fill-opacity="0.8"/>
  <rect x="92" y="21" width="6" height="6" transform="rotate(45 95 24)" fill="none" stroke="#4D8AFF" stroke-opacity="0.6" stroke-width="1"/>
  <rect x="801" y="45" width="6" height="6" transform="rotate(45 804 48)" fill="none" stroke="#7C3AED" stroke-opacity="0.6" stroke-width="1"/>
  <!-- data packet descending the spine -->
  <circle r="2.6" fill="#00E5FF">
    <animateMotion path="M450 0 L450 72" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <!-- packets along branches (staggered, subtle) -->
  <circle r="1.8" fill="#4D8AFF" opacity="0.9">
    <animateMotion path="M450 36 H330 V24 H180" dur="3.6s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="3.6s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.8" fill="#7C3AED" opacity="0.9">
    <animateMotion path="M450 36 H570 V48 H720" dur="3.6s" begin="2.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="3.6s" begin="2.1s" repeatCount="indefinite"/>
  </circle>
</svg>
